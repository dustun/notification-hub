version: '3'

tasks:

  up:
    desc: Запустить проект (БЕЗ пересборки — быстро)
    cmds:
      - docker compose up -d

  up-build:
    desc: Пересобрать образ и запустить (используй только когда менял Dockerfile или зависимости)
    cmds:
      - docker compose up -d --build

  rebuild:
    desc: Полная пересборка без кэша (когда всё совсем плохо)
    cmds:
      - docker compose down --rmi local -v
      - docker compose up -d --build

  down:
    desc: Остановить всё
    cmds:
      - docker compose down

  restart:
    desc: Перезапустить без пересборки
    cmds:
      - docker compose restart

  logs:
    desc: Логи приложения
    cmds:
      - docker compose logs -f app

  artisan:
    desc: Запустить artisan команду (полное название)
    cmds:
      - sh -c 'docker compose exec app php artisan "$@"' -- "$@"

  shell:
    desc: Зайти в контейнер
    cmds:
      - docker compose exec app sh

  php:
    desc: Проверить версию PHP и расширения
    cmds:
      - docker compose exec app php -v
      - docker compose exec app php -m | grep -E 'redis|sockets|pdo_pgsql'

  cs:
    desc: PHP CS Fixer — исправить код
    cmds:
      - ./vendor/bin/php-cs-fixer fix --config=.php-cs-fixer.php --using-cache=no --verbose

  cs:dry:
    desc: PHP CS Fixer — проверить без изменений
    cmds:
      - ./vendor/bin/php-cs-fixer fix --config=.php-cs-fixer.php --using-cache=no --dry-run --verbose

  phpstan:
    desc: Запустить PHPStan анализ кода (уровень 8)
    cmds:
      - docker compose exec app ./vendor/bin/phpstan analyse --memory-limit=1G

  phpstan:level9:
    desc: Запустить PHPStan на максимальном уровне 9 (очень строго)
    cmds:
      - docker compose exec app ./vendor/bin/phpstan analyse --level=9 --memory-limit=1G

  phpstan:baseline:
    desc: Создать baseline (чтобы не фиксить старые ошибки сразу)
    cmds:
      - docker compose exec app ./vendor/bin/phpstan analyse --generate-baseline phpstan-baseline.neon
