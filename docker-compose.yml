version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: image-processor-app
    container_name: image-processor-app
    restart: unless-stopped
    user: "1000:1000"   # Замени на свой uid:gid (выполни id -u && id -g на хосте)
    volumes:
      - .:/var/www/html
    networks:
      - app-network
    depends_on:
      - pgsql
      - redis
      - rabbitmq

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app-network
    depends_on:
      - app

  pgsql:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: image_processor
      POSTGRES_USER: sail
      POSTGRES_PASSWORD: password
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgsql_data:
  redis_data:
  rabbitmq_data:
  caddy_data:
  caddy_config:
